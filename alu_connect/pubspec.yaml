name: alu_connect
description: ALU Connect - Student engagement & collaboration platform for African Leadership University.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # backend
  supabase_flutter: ^2.5.6

  # state management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # navigation
  go_router: ^14.2.7

  # local storage
  shared_preferences: ^2.3.2
  flutter_dotenv: ^5.2.1

  # UI / utilities
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  timeago: ^3.6.1
  intl: ^0.19.0
  uuid: ^4.4.2
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
